<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="nvimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded hexagon -->
  <polygon points="128,16 234,72 234,184 128,240 22,184 22,72" fill="url(#nvimGrad)" stroke="#065f46" stroke-width="4" stroke-linejoin="round"/>
  <!-- NVIM text -->
  <text x="128" y="148" font-family="'Courier New', monospace" font-size="60" font-weight="900" fill="#0f172a" text-anchor="middle" letter-spacing="4">NVIM</text>
  <!-- Small cursor accent -->
  <rect x="120" y="180" width="4" height="14" fill="#818cf8" rx="2">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
