<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Diamond/rhombus -->
  <polygon points="32,4 60,32 32,60 4,32" fill="url(#g)" stroke="#166534" stroke-width="2" stroke-linejoin="round"/>
  <!-- VIM text -->
  <text x="32" y="42" font-family="'Courier New',monospace" font-size="24" font-weight="900" fill="#0f172a" text-anchor="middle" letter-spacing="1">VIM</text>
  <!-- Blinking cursor -->
  <rect x="22" y="48" width="2" height="7" fill="#fbbf24" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
