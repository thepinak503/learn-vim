<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="vimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Hexagonal shape -->
  <polygon points="128,20 228,74 228,182 128,236 28,182 28,74" fill="url(#vimGrad)" stroke="#166534" stroke-width="4" stroke-linejoin="round"/>
  <!-- VIM text -->
  <text x="128" y="148" font-family="'Courier New', monospace" font-size="72" font-weight="900" fill="#0f172a" text-anchor="middle" letter-spacing="6">VIM</text>
  <!-- Small cursor accent -->
  <rect x="98" y="188" width="4" height="16" fill="#fbbf24" rx="2">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
